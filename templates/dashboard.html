<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>User Dashboard</title>
  <style>
    :root {
      --primary: #0A66C2;
      --secondary: #004182;
      --light-bg: #EFF3F8;
      --lighter-bg: #F3F6F8;
      --card-bg: rgba(255, 255, 255, 0.85);
      --border-blue: #C7D3E0;
      --button-blue: #0A66C2;
      --button-blue-hover: #004182;
      --danger: #D11141;
      --danger-hover: #A50E2E;
      --accent: #0077b5;
      --accent-dark: #005f8d;
      --text: #033047;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        repeating-linear-gradient(
            135deg,
            rgba(255,255,255,0.03) 0px,
            rgba(255,255,255,0.03) 8px,
            rgba(0,0,0,0.05) 8px,
            rgba(0,0,0,0.05) 16px
        ),
        linear-gradient(135deg, #5ba9e5 0%, #3087cf 50%, #116cb7 100%);
    }

    .top-header {
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 20px;
      box-shadow: 0px 2px 12px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border-blue);
    }

    .top-header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 600;
      color: var(--primary);
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 40px auto;
      background: var(--card-bg);
      padding: 30px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0px 4px 16px rgba(0,0,0,0.08);
      border: 1px solid var(--border-blue);
    }

    .status {
      font-size: 18px;
      color: var(--secondary);
      font-weight: 500;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status::before {
      content: "●";
      color: #00A660;
      font-size: 14px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
    }

    .card {
      background: var(--card-bg);
      padding: 40px 20px;
      text-align: center;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 600;
      color: var(--secondary);
      box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.06);
      transition: 0.25s ease;
      border: 1px solid var(--border-blue);
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.12);
      background: var(--card-bg);
      border-color: var(--primary);
    }

    .bottom-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 40px auto 20px;
      max-width: 1200px;
    }

    .logout-btn, .back-btn {
      border: none;
      padding: 14px 35px;
      font-size: 16px;
      border-radius: 24px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.25s ease;
      width: 220px;
    }

    .logout-btn {
      background: var(--danger);
      color: white;
      border: 1px solid var(--danger);
    }

    .logout-btn:hover {
      background: var(--danger-hover);
      transform: translateY(-2px);
      box-shadow: 0px 4px 12px rgba(209, 17, 65, 0.3);
    }

    .back-btn {
      background: var(--button-blue);
      color: white;
      border: 1px solid var(--button-blue);
    }

    .back-btn:hover {
      background: var(--button-blue-hover);
      transform: translateY(-2px);
      box-shadow: 0px 4px 12px rgba(10, 102, 194, 0.3);
    }

    @media (max-width: 600px) {
      .card-grid {
        grid-template-columns: 1fr;
      }
      .top-header h1 {
        font-size: 24px;
      }
      .bottom-buttons {
        flex-direction: column;
        align-items: center;
      }
      .card {
        padding: 30px 20px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

<div class="top-header">
  <h1>Welcome {{ username }}!</h1>
</div>

<div class="container">
  <p class="status">You are logged in</p>

  <div class="card-grid">
    <div class="card" onclick="window.location.href='/search'">📁 Database Access</div>
    <div class="card" onclick="window.location.href='/live'">📡 Live </div>
    <div class="card" onclick="window.location.href='/live_multiple'">🎓 Canara Alumni</div>
    <div class="card" onclick="window.location.href='/auto_connect'">⚙️ AutoConnect</div>
  </div>
</div>

<div class="bottom-buttons">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <button class="logout-btn" onclick="window.location.href='/logout'">Logout</button>
</div>

<script>
  function goBack() {
    window.history.back();
  }
</script>

</body>
</html>
